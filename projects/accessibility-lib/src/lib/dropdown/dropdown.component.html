<div class="dropdown-root">
  <!-- Trigger -->
  <button
    type="button"
    class="dropdown-trigger"
    [attr.aria-haspopup]="'menu'"
    [attr.aria-expanded]="open"
    [attr.aria-controls]="menuId"
    [id]="triggerId"
    (click)="toggleMenu()"
    (keydown)="onTriggerKey($event)"
  >
    <mat-icon *ngIf="triggerIcon" aria-hidden="true" class="trigger-icon">{{ triggerIcon }}</mat-icon>
    {{ triggerLabel }}
    <mat-icon class="chevron" [class.chevron--open]="open" aria-hidden="true">expand_more</mat-icon>
  </button>

  <!-- Menu -->
  <ul
    *ngIf="open"
    role="menu"
    [id]="menuId"
    [attr.aria-labelledby]="triggerId"
    class="dropdown-menu"
    (keydown)="onMenuKey($event)"
  >
    <ng-container *ngFor="let item of items; let i = index">
      <li *ngIf="item.dividerBefore" role="separator" class="menu-divider"></li>
      <li
        role="menuitem"
        [id]="itemId(item.id)"
        [attr.aria-disabled]="item.disabled || null"
        [attr.tabindex]="item.disabled ? -1 : (focusedIndex === i ? 0 : -1)"
        [class.menu-item--disabled]="item.disabled"
        [class.menu-item--focused]="focusedIndex === i"
        class="menu-item"
        (click)="!item.disabled && selectItem(item)"
        (mouseenter)="!item.disabled && setFocus(i)"
      >
        <mat-icon *ngIf="item.icon" class="item-icon" aria-hidden="true">{{ item.icon }}</mat-icon>
        {{ item.label }}
      </li>
    </ng-container>
  </ul>
</div>
